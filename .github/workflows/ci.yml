name: Build

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
        config: [Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # build against a https://github.com/sony/nmos-cpp commit
      # until a Conan Center release of nmos-cpp is published.
      - name: Clone nmos-cpp alongside nvnmos
        env:
          NMOS_CPP_REF: a8874989a7c40cb01d38cd19388af3f329e1421d
        run: |
          parent="$(dirname "${GITHUB_WORKSPACE}")"
          git init "${parent}/nmos-cpp"
          git -C "${parent}/nmos-cpp" remote add origin https://github.com/sony/nmos-cpp.git
          git -C "${parent}/nmos-cpp" fetch --depth 1 origin "${NMOS_CPP_REF}"
          git -C "${parent}/nmos-cpp" checkout FETCH_HEAD

      - name: Install Conan
        run: pip install conan~=2.2 && conan profile detect
      - name: Install dependencies
        run: |
          conan install src \
            --settings:all build_type=${{ matrix.config }} \
            --build=missing \
            --output-folder=src/conan \
            --lockfile="" \
            -o "&:nmos_cpp_from_source=True"
      - name: Generate nvnmos (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=conan/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DUSE_ADD_SUBDIRECTORY=ON \
            src
      - name: Generate nvnmos (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=conan/conan_toolchain.cmake \
            -DCMAKE_CONFIGURATION_TYPES=${{ matrix.config }} \
            -DUSE_ADD_SUBDIRECTORY=ON \
            src
      - name: Build nvnmos (Linux)
        if: runner.os == 'Linux'
        run: |
          # default -j$(nproc) causes out of memory on hosted runners (cc1plus killed).
          cmake --build build --parallel 2
      - name: Build nvnmos (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --build build --config=${{ matrix.config }} --parallel 2
      # Upload the Linux shared library so the `rust` job can link against
      # it without rebuilding the C side from scratch.
      - name: Upload libnvnmos.so (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: libnvnmos-linux
          path: build/libnvnmos.so
          if-no-files-found: error
          retention-days: 1
  rust:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download libnvnmos.so
        uses: actions/download-artifact@v7
        with:
          name: libnvnmos-linux
          path: build

      # bindgen (nvnmos-sys) needs libclang; gst-nmos-rs links GStreamer 1.x.
      # Unit tests instantiate real elements (udpsrc, rtpvrawdepay, …) from
      # gst-plugins-base / gst-plugins-good — dev packages alone are not enough.
      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            clang \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good

      # For now, use whatever Rust toolchain ships with the ubuntu-24.04 runner
      - name: Print Rust toolchain
        run: |
          rustc --version
          cargo --version
          cargo clippy --version

      - name: Cargo clippy (workspace)
        working-directory: rust
        env:
          NVNMOS_LIB_DIR: ${{ github.workspace }}/build
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      # The multi-flow integration test that needs `/dev/shm` and a real
      # MXL setup is `#[ignore]`d and skipped by default.
      - name: Cargo test (workspace)
        working-directory: rust
        env:
          NVNMOS_LIB_DIR: ${{ github.workspace }}/build
          LD_LIBRARY_PATH: ${{ github.workspace }}/build
        run: cargo test --workspace --locked --no-fail-fast
  license-check:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - run: mkdir LICENSES && cp LICENSE LICENSES/Apache-2.0.txt
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v6
