name: Build

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
        config: [Release]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Conan
        run: pip install conan~=2.2 && conan profile detect
      - name: Prepare Conan profile (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # windows-2025 is migrating to Visual Studio 2026 (MSVC 195)
          # Conan Center prebuilt binaries target MSVC 193/194.
          # Pin MSVC 194 so conan install downloads packages instead of
          # building from source. See actions/runner-images#14017.
          $profile = conan profile path default
          (Get-Content $profile) `
            -replace '^compiler\.cppstd=.*$', 'compiler.cppstd=17' `
            -replace '^compiler\.version=.*$', 'compiler.version=194' |
            Set-Content $profile
      - name: Install dependencies
        run: |
          conan install src \
            --settings:all build_type=${{ matrix.config }} \
            --build=missing \
            --output-folder=src/conan \
            --lockfile=src/conan.lock
      - name: Generate nvnmos (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=conan/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            src
      - name: Generate nvnmos (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=conan/conan_toolchain.cmake \
            -DCMAKE_CONFIGURATION_TYPES=${{ matrix.config }} \
            src
      - name: Build nvnmos (Linux)
        if: runner.os == 'Linux'
        run: |
          # default -j$(nproc) causes out of memory on hosted runners (cc1plus killed).
          cmake --build build --parallel 2
      - name: Build nvnmos (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --build build --config=${{ matrix.config }} --parallel 2
      # Upload the Linux shared library so the `rust` job can link against
      # it without rebuilding the C side from scratch.
      - name: Upload libnvnmos.so (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: libnvnmos-linux
          path: build/libnvnmos.so
          if-no-files-found: error
          retention-days: 1
  rust:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download libnvnmos.so
        uses: actions/download-artifact@v7
        with:
          name: libnvnmos-linux
          path: build

      # bindgen (nvnmos-sys) needs libclang; gst-nmos-rs links GStreamer 1.x.
      # Unit tests instantiate real elements (udpsrc, rtpvrawdepay, …) from
      # gst-plugins-base / gst-plugins-good, and nmosaudiochannelmap uses
      # audiomixmatrix from gst-plugins-bad — dev packages alone are not enough.
      # cairo / pango are needed to build (and load) the gst-plugins-rs
      # closedcaption plugin below (its overlay elements link pangocairo).
      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            clang \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            libcairo2-dev \
            libpango1.0-dev

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          rust-src-dir: rust
          components: clippy, rustfmt
          rustflags: ""

      - name: Print Rust toolchain
        run: |
          rustc --version
          cargo --version
          cargo clippy --version

      - name: Cargo fmt (workspace)
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Cargo clippy (workspace)
        working-directory: rust
        env:
          NVNMOS_LIB_DIR: ${{ github.workspace }}/build
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      # Build the gst-plugins-rs elements the sync tests need — st2038extractor /
      # st2038combiner (closedcaption), rtpsmpte291pay / rtpsmpte291depay (rtp) and
      # udpsrc2 (udp) — at a pinned main commit that carries the st2038combiner skew
      # and rtpsmpte291depay multi-ANC fixes (and, unlike the 0.15 branch, udpsrc2),
      # and put them on GST_PLUGIN_PATH so the udp av_sync case (and udp2 tests) run
      # here instead of self-skipping. The mxl and nvdsudp cases still self-skip
      # (no libmxl / DeepStream on the runner).
      - name: Build gst-plugins-rs plugins (pinned)
        env:
          GST_PLUGINS_RS_REF: 8d5c60f0a67d3aa8120bf940b46fc3c18209661c
          RUSTUP_TOOLCHAIN: "1.92"
        run: |
          git init "${RUNNER_TEMP}/gst-plugins-rs"
          cd "${RUNNER_TEMP}/gst-plugins-rs"
          git remote add origin https://gitlab.freedesktop.org/gstreamer/gst-plugins-rs.git
          git fetch --depth 1 origin "${GST_PLUGINS_RS_REF}"
          git checkout FETCH_HEAD
          cargo build --release \
            -p gst-plugin-closedcaption \
            -p gst-plugin-rtp \
            -p gst-plugin-udp

      # The daemon-backed integration tests self-gate: they run here because
      # nvnmosd + libnvnmos.so are present. GST_PLUGIN_PATH adds the pinned
      # gst-plugins-rs plugins built above.
      - name: Cargo test (workspace)
        working-directory: rust
        env:
          NVNMOS_LIB_DIR: ${{ github.workspace }}/build
          LD_LIBRARY_PATH: ${{ github.workspace }}/build
          GST_PLUGIN_PATH: ${{ runner.temp }}/gst-plugins-rs/target/release
        shell: bash
        # --show-output surfaces the `test <name> ... skipped, <reason>` lines
        # that test-skip's `skip!` prints (libtest captures them otherwise and
        # counts the test as passed). Aggregate them into a result line and a
        # GitHub notice / job summary so self-skips are visible at a glance.
        run: |
          set +e
          cargo test --workspace --locked --no-fail-fast -- --show-output 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          set -e
          skipped=$(grep -E '^test .* \.\.\. skipped,' test.log || true)
          count=$(grep -cE '^test .* \.\.\. skipped,' test.log || true)
          echo "test result: ${count} skipped"
          if [ "${count}" -gt 0 ]; then
            echo "::notice title=Runtime tests skipped::${count} test(s) self-skipped; see job summary"
            {
              echo "### Runtime tests skipped (${count})"
              echo
              echo '```text'
              printf '%s\n' "${skipped}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "${status}"
  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -f docker/nvnmos/Dockerfile -t nvnmos:ci .

      - name: Run entrypoint smoke tests (non-root)
        run: docker run --rm --user 1000:1000 --cap-drop=ALL nvnmos:ci true
  license-check:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - run: mkdir LICENSES && cp LICENSE LICENSES/Apache-2.0.txt
    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v6
