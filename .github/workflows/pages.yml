name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/pages.yml'
      - 'Doxyfile'
      - 'README.md'
      - 'doc/doxygen/**'
      - 'doc/user/**'
      - 'src/**'
      - 'rust/docs/**'
      - 'rust/gst-nmos-rs/**'
      - 'rust/gst-avsynctest-rs/**'
      - 'rust/nvnmosd/README.md'
      - 'rust/nvnmos-rpc/proto/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install Doxygen
      run: sudo apt update && sudo apt install -y doxygen graphviz

    - name: Generate C API documentation
      run: |
        cd src
        python3 ../doc/doxygen/prepare-markdown.py
        doxygen ../Doxyfile
        mv html ../public

    - name: Build daemon gRPC documentation
      run: |
        sudo apt-get install -y protobuf-compiler
        python3 -m venv .venv-sabledocs
        . .venv-sabledocs/bin/activate
        pip install "sabledocs==0.19.1050"
        cd rust/nvnmos-rpc/proto
        protoc nvnmosd.proto -o descriptor.pb --include_source_info
        sabledocs
        sed -i 's#<span>Source</span>#<span>View on GitHub</span>#g' sabledocs_output/*.html
        cat nvnmos-theme.css >> sabledocs_output/static/mystyles.css
        mkdir -p "$GITHUB_WORKSPACE/public/grpc"
        cp -a sabledocs_output/* "$GITHUB_WORKSPACE/public/grpc/"

    - name: Install GStreamer plugin documentation toolchain
      run: |
        sudo apt-get install -y \
          meson ninja-build \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          python3-dev libxml2-dev libxslt1-dev cmake libyaml-dev \
          libjson-glib-dev flex
        python3 -m venv .venv-hotdoc
        . .venv-hotdoc/bin/activate
        pip install "hotdoc~=0.18.0"
        echo "$PWD/.venv-hotdoc/bin" >> "$GITHUB_PATH"

    - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
      with:
        rust-src-dir: rust
        rustflags: ""

    - name: Build GStreamer plugin documentation
      run: |
        export CARGO_TARGET_DIR="$PWD/rust/target"
        cd rust/docs/gstreamer
        meson setup build -Ddoc=enabled
        ninja -C build gstreamer-doc
        mkdir -p "$GITHUB_WORKSPACE/public/gstreamer"
        cp -a build/NvNmos-GStreamer-doc/html/* "$GITHUB_WORKSPACE/public/gstreamer/"

    - name: Upload Pages artifact
      if: github.event_name == 'push'
      uses: actions/upload-pages-artifact@v5
      with:
        path: public

    # Hotdoc search names fragment/token files after GObject properties and
    # keywords, so the output contains ':' and case-only-distinct paths. Those
    # are fine for the tar-based Pages artifact but rejected by the raw preview
    # upload, so package the preview as a single tarball to keep it lossless.
    - name: Package preview artifact
      if: github.event_name != 'push'
      run: |
        name="docs-${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
        echo "artifact_name=${name//\//-}" >> "$GITHUB_ENV"
        tar --dereference -C public -czf "$RUNNER_TEMP/docs-preview.tar.gz" .

    - name: Upload preview artifact
      if: github.event_name != 'push'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.artifact_name }}
        path: ${{ runner.temp }}/docs-preview.tar.gz
        retention-days: 14

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v5
