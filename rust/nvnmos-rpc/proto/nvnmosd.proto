syntax = "proto3";

package nvnmos.daemon.v1;

// The NvnmosDaemon gRPC service.
//
// Wire contract between `nvnmosd` (which wraps `libnvnmos`) and its clients
// (`gst-nmos-rs` GStreamer plugin, the `nvnmosd-example` regression
// client, future Python/C++ control planes). See
// `doc/designs/nvnmosd/README.md` for the design rationale.
//
// Naming convention:
//
// * `<thing>_id` — an NMOS resource UUID. Stable, generated by libnvnmos
//   from a seed, and what shows up at IS-04 (`/self/<id>`,
//   `/senders/<id>`, `/receivers/<id>`).
//
// * `<thing>_handle` — a daemon-local opaque token. Issued by the daemon,
//   meaningful only within this gRPC API, and not surfaced to NMOS
//   controllers. Treat as opaque; do not parse.
service NvnmosDaemon {
  // -------- Node lifecycle (persistent Nodes) --------
  //
  // `AddNode` / `RemoveNode` manage persistent Nodes — Nodes that exist
  // independently of any contributing session and that serve as
  // discovery anchors in IS-04 even when no client process is currently
  // attached. Sessions may still attach to a persistent Node via
  // `OpenSession` and contribute senders/receivers to it.
  //
  // Most deployments don't need persistent Nodes; the implicit
  // session-refcounted lifetime exposed by `OpenSession` is sufficient
  // and avoids the explicit teardown step.

  // Create a persistent Node bound to `node_seed`. Errors with
  // `ALREADY_EXISTS` if a Node (persistent or session-refcounted)
  // already exists for that seed.
  rpc AddNode(AddNodeRequest) returns (AddNodeResponse);

  // Tear down a persistent Node. Errors with `FAILED_PRECONDITION` if
  // the Node was created by `OpenSession` (i.e. is session-refcounted,
  // not persistent), or if any sessions are still attached — close
  // them first.
  rpc RemoveNode(RemoveNodeRequest) returns (Empty);

  // -------- Sessions --------
  //
  // A session contributes resources to exactly one Node. Many sessions
  // (across many client processes) may share a Node by `node_seed`.
  // The session handle distinguishes them so that the daemon can
  // refcount Node lifetime correctly, route activations only to the
  // session that registered the affected resource, and drop the right
  // resources when a stream dies.

  // Open a session on the Node identified by `node_seed`. Attaches to
  // an existing Node (persistent or session-refcounted). If no Node
  // currently exists for the seed, creates a session-refcounted Node
  // from `node_config` and attaches to that. Returns a daemon-local
  // session handle used to address all subsequent RPCs.
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);

  // Close a session. Removes any resources the session contributed.
  // Tears down the backing Node if the session was the last attached
  // *and* the Node is session-refcounted (i.e. was not created by
  // `AddNode`).
  rpc CloseSession(CloseSessionRequest) returns (Empty);

  // -------- Resource lifecycle --------
  //
  // `transport_file` is the same string libnvnmos consumes today: an SDP
  // for `TRANSPORT_RTP`, or an MXL `flow_def` JSON for `TRANSPORT_MXL`.
  // libnvnmos extracts the session-level `x-nvnmos-id` attribute (SDP) or
  // `x-nvnmos-id` key (MXL JSON) out of the transport_file and uses it as
  // the resource's internal id, from which it derives the NMOS UUID.
  //
  // `internal_id` on the request **must** equal the `x-nvnmos-id` carried
  // by `transport_file`. The daemon validates this by asking libnvnmos
  // after the resource is added: a successful lookup of the claimed
  // `internal_id` proves the two agreed. A mismatch returns
  // `INVALID_ARGUMENT`; the disagreeing resource will exist in libnvnmos
  // as a stray until the first activation, at which point the daemon's
  // activation router cleans it up.
  //
  // The returned `resource_handle` is the daemon's local addressing
  // token. The corresponding NMOS `/senders/<id>` or `/receivers/<id>`
  // UUID is returned in `resource_id` for the client's convenience
  // (e.g. cross-referencing with controller logs); the daemon uses the
  // handle for all later RPCs.

  rpc AddSender(AddSenderRequest) returns (AddResourceResponse);
  rpc AddReceiver(AddReceiverRequest) returns (AddResourceResponse);
  rpc RemoveResource(RemoveResourceRequest) returns (Empty);

  // -------- Activation flow --------
  //
  // Long-lived server-streaming RPC. One stream per session, kept open for
  // the session's lifetime. Each `ActivationEvent` reports an IS-05
  // activation (or deactivation) that NvNmos has just received and is
  // blocked on. The client applies (or refuses) the activation and replies
  // with `AckActivation`, which unblocks NvNmos and lets IS-05 respond to
  // the controller.
  rpc SubscribeActivations(SubscribeActivationsRequest) returns (stream ActivationEvent);

  // Required after each `ActivationEvent`. The success/failure outcome and
  // optional failure reason propagate verbatim to NvNmos and onward to the
  // IS-05 controller — see `doc/designs/nvnmosd/README.md` ("Activation
  // flow") for why this matters.
  //
  // This RPC does **not** call `nmos_connection_activate`. NvNmos updates
  // IS-04/IS-05 automatically when its callback returns success.
  rpc AckActivation(AckActivationRequest) returns (Empty);

  // -------- Out-of-band state sync --------
  //
  // Reports a data-plane change that NvNmos didn't initiate. Maps inside
  // the daemon to `nmos_connection_activate`. Use this when, for example,
  // a real client (not a gst-launch demo) adjusts its data plane outside
  // of an IS-05 PATCH and wants IS-04/IS-05 to reflect the new state.
  rpc SyncResourceState(SyncResourceStateRequest) returns (Empty);
}

// -------- Common --------

message Empty {}

// Subset of NvNmosTransport that's meaningful at the daemon API surface.
// `UNSPECIFIED` is the proto3 zero value and is an error from a client.
enum Transport {
  TRANSPORT_UNSPECIFIED = 0;
  TRANSPORT_RTP = 1;
  TRANSPORT_MXL = 2;
}

// -------- Node config --------

// Configuration for creating a Node (via `AddNode` for a persistent
// Node, or via `OpenSession` for a session-refcounted Node). Mirrors a
// subset of `NvNmosNodeConfig` from `src/nvnmos.h`. Unset fields take
// their libnvnmos defaults (autodetect host name, autodetect addresses,
// default ports, random seed if absent, etc.).
message NodeConfig {
  // NvNmos seed (`x-nvnmos-node-seed` semantics). The daemon's
  // multi-Node lookup key. The NMOS `/self` `node_id` is generated by
  // libnvnmos deterministically from this seed; the same seed always
  // yields the same `node_id`, whether the Node is created by
  // `AddNode` or by the first `OpenSession`.
  string seed = 1;

  string host_name = 2;
  repeated string host_addresses = 3;
  uint32 http_port = 4;

  string label = 5;
  string description = 6;

  AssetConfig asset_tags = 7;
  NetworkServicesConfig network_services = 8;
}

// BCP-002-02 Asset Distinguishing Information.
message AssetConfig {
  string manufacturer = 1;
  string product = 2;
  string instance_id = 3;
  repeated string functions = 4;
}

message NetworkServicesConfig {
  // DNS domain; use "local" to force mDNS. Empty for automatic.
  string domain = 1;
  // Fixed IS-04 Registration API host/IP; disables DNS-SD when set.
  string registration_address = 2;
  uint32 registration_port = 3;
  string registration_version = 4;
}

// -------- Node lifecycle --------

message AddNodeRequest {
  // Identifies the Node. Errors with `ALREADY_EXISTS` if a Node
  // (persistent or session-refcounted) is already bound to this seed.
  string node_seed = 1;

  NodeConfig node_config = 2;
}

message AddNodeResponse {
  // The NMOS `/self` UUID libnvnmos generated for this Node from
  // `node_seed`. Informational — the daemon never accepts this as input.
  string node_id = 1;
}

message RemoveNodeRequest {
  string node_seed = 1;
}

// -------- Sessions --------

message OpenSessionRequest {
  // NvNmos seed identifying which Node to attach to. If no Node
  // currently exists for this seed, `node_config` is used to create
  // a session-refcounted Node.
  string node_seed = 1;

  // Consulted only when this `OpenSession` call creates the Node
  // (i.e. when no Node currently exists for `node_seed`). Ignored
  // otherwise — once a Node exists, its configuration is fixed,
  // whether it was created by `AddNode` or by an earlier `OpenSession`.
  NodeConfig node_config = 2;
}

message OpenSessionResponse {
  // Daemon-local session handle. Pass back to all subsequent RPCs.
  string session_handle = 1;

  // The NMOS `/self` UUID libnvnmos generated for the Node this session
  // is attached to. Stable across sessions that share the same
  // `node_seed`. Informational — the daemon never accepts this as input.
  string node_id = 2;
}

message CloseSessionRequest {
  string session_handle = 1;
}

// -------- Resources --------

message AddSenderRequest {
  string session_handle = 1;
  Transport transport = 2;
  string transport_file = 3;

  // The `x-nvnmos-id` inside `transport_file`. Required; must match the
  // value embedded in `transport_file`. See the `Resource lifecycle`
  // section above for how the daemon validates this and what happens on
  // a mismatch.
  string internal_id = 4;
}

message AddReceiverRequest {
  string session_handle = 1;
  Transport transport = 2;
  string transport_file = 3;

  // The `x-nvnmos-id` inside `transport_file`. Required; must match the
  // value embedded in `transport_file`. See the `Resource lifecycle`
  // section above for how the daemon validates this and what happens on
  // a mismatch.
  string internal_id = 4;
}

message AddResourceResponse {
  // Daemon-local handle. Use in `RemoveResource` / `AckActivation` /
  // `SyncResourceState` / `ActivationEvent.resource_handle`.
  string resource_handle = 1;

  // NMOS resource UUID (`/senders/<id>` or `/receivers/<id>`) that
  // libnvnmos generated from the seed inside the transport_file.
  string resource_id = 2;
}

message RemoveResourceRequest {
  string session_handle = 1;
  string resource_handle = 2;
}

// -------- Activations --------

message SubscribeActivationsRequest {
  string session_handle = 1;
}

message ActivationEvent {
  // The resource the activation applies to.
  string resource_handle = 1;

  // Daemon-local handle for the activation; pass back unchanged in
  // `AckActivationRequest.activation_handle`.
  string activation_handle = 2;

  // True when the activation enables the resource; false when it
  // deactivates it. `transport_file` is meaningful only when `active`
  // is true.
  bool active = 3;

  // The updated transport_file in the same format as `AddSender` /
  // `AddReceiver`. Empty string when `active` is false.
  string transport_file = 4;
}

message AckActivationRequest {
  string session_handle = 1;
  string activation_handle = 2;

  bool success = 3;

  // Free-form failure reason, surfaced to the IS-05 controller. Set
  // only when `success` is false.
  string failure_reason = 4;
}

// -------- Out-of-band sync --------

message SyncResourceStateRequest {
  string session_handle = 1;
  string resource_handle = 2;
  // The new transport_file reflecting the out-of-band state. Same
  // format as `AddSender` / `AddReceiver`.
  string transport_file = 3;
}
